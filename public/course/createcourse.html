<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Course</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #4f46e5, #9333ea);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }

    form {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #4f46e5;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: bold;
      color: #333;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #4f46e5;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #3730a3;
    }

    @media (max-width: 600px) {
      body {
        padding: 20px;
      }

      form {
        padding: 20px;
      }

      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <form id="courseForm" enctype="multipart/form-data">
    <h2>Create Course</h2>
    <input type="text" name="title" placeholder="Course Title" required />
    <textarea name="description" placeholder="Course Description" rows="4" required></textarea>
    <input type="text" name="teacher_name" placeholder="Teacher Name" required />
    <select name="standard" required>
      <option value="">Select Standard</option>
      <option value="10th">10th</option>
      <option value="12th">12th</option>
      <option value="UG">Undergraduate</option>
      <option value="PG">Postgraduate</option>
    </select>

    <label for="video">Upload Course Video:</label>
    <input type="file" name="video" id="video" accept="video/*" required />

    <button type="submit">Create Course</button>
  </form>

  <script>
    document.getElementById('courseForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const formData = new FormData(this);
      try {
        const res = await fetch('http://localhost:5000/api/courses/create', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        alert(data.message);
      } catch (err) {
        console.error(err);
        alert('Error creating course');
      }
    });
  </script>
</body>
</html>
