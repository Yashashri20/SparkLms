<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Available Quizzes</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #4f46e5, #9333ea);
      padding: 20px;
      color: #fff;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      color: #fff;
    }

    .quiz-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .quiz-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      color: #333;
    }

    .quiz-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
    }

    .quiz-card h3 {
      margin-bottom: 10px;
      color: #4f46e5;
    }

    .quiz-card p {
      font-size: 1rem;
      margin-bottom: 15px;
    }

    .quiz-card button {
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .quiz-card button:hover {
      background: #3730a3;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      .quiz-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <h1>Available Quizzes</h1>
  <div class="quiz-list" id="quizList">Loading quizzes...</div>

  <script>
    async function loadQuizzes() {
      try {
        const res = await fetch('http://localhost:5000/api/quiz');
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const quizzes = await res.json();

        const quizList = document.getElementById('quizList');
        quizList.innerHTML = '';

        if (quizzes.length === 0) {
          quizList.innerHTML = '<p>No quizzes available.</p>';
          return;
        }

        quizzes.forEach(quiz => {
          const card = document.createElement('div');
          card.className = 'quiz-card';
          card.innerHTML = `
            <h3>${quiz.title}</h3>
            <p><strong>Standard:</strong> ${quiz.standard}</p>
            <button onclick="takeQuiz(${quiz.quiz_id})">Take Quiz</button>
          `;
          quizList.appendChild(card);
        });
      } catch (err) {
        console.error('Error loading quizzes:', err);
        document.getElementById('quizList').innerHTML = '<p>Error loading quizzes.</p>';
      }
    }

    function takeQuiz(id) {
      window.location.href = `viewquiz.html?quizId=${id}`;
    }

    loadQuizzes();
  </script>
</body>
</html>
