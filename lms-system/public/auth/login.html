<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <div class="container">
    <div class="login-section">
      <h2>Login</h2>
      <p>Login to access your account</p>
      <form id="loginform">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="john.doe@gmail.com"  name="email" required />

        <!-- Password field -->
        <label>Password</label><input type="password" value="" id="myInput" name="password" >

        <!-- An element to toggle between password visibility -->
        <div class="check">
          <span>
            <input type="checkbox" class="passwd" onclick="myFunction()">
            Show Password</span>


          <div class="options">
            <a href="#" class="forgot">Forgot Password</a>
          </div>
        </div>
        <select name="role" class="role1">
          <option value="Student">Student</option>
          <option value="Teacher">Teacher</option>
        </select>
        <button type="submit" class="login-btn" href="C:\Users\Admin\Documents\new Field Project\landing page.html">Login</button>

        <p class="signup">Don't have an account? <a href="signup.html">Sign up</a></p>

        <div class="divider">Or login with</div>
        <div class="socials">
          <button class="facebook"><a href="www.facebook.com"></a>
            <svg viewBox="0 0 24 24" height="20" fill="#3b5998">
              <path
                d="M22 12a10 10 0 1 0-11.6 9.87v-7H8v-3h2.4v-2.3c0-2.4 1.4-3.7 3.5-3.7 1 0 2 .2 2 .2v2.3h-1.1c-1.1 0-1.4.7-1.4 1.4V12H18l-.5 3h-2.6v7A10 10 0 0 0 22 12Z" />
            </svg>
          </button>
          <button class="google"><a href="www.google.com"></a>
            <svg viewBox="0 0 24 24" height="20">
              <path d="M21.6 12.2c0-.7-.1-1.4-.2-2h-9.4v3.8h5.4c-.2 1.1-.9 2.1-1.8 2.8v2.3h2.9c1.7-1.5 2.8-3.7 2.8-6.4z"
                fill="#4285F4" />
              <path
                d="M12 22c2.4 0 4.4-.8 5.9-2.1l-2.9-2.3c-.8.6-1.8.9-3 .9-2.3 0-4.3-1.6-5-3.8H4v2.4A10 10 0 0 0 12 22z"
                fill="#34A853" />
              <path d="M7 13.7c-.2-.6-.3-1.2-.3-1.8s.1-1.2.3-1.8V7.7H4A10 10 0 0 0 2 12c0 1.6.4 3.1 1 4.3L7 13.7z"
                fill="#FBBC05" />
              <path d="M12 6.1c1.3 0 2.5.4 3.5 1.2l2.6-2.6A10 10 0 0 0 4 7.7l3 2.3c.7-2.2 2.7-3.9 5-3.9z"
                fill="#EA4335" />
            </svg>
          </button>

        </div>
      </form>
    </div>

    <div class="illustration">
      <img src="Screenshot (4).png" alt="Illustration" />
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
