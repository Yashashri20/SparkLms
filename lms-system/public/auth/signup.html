<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <link rel="stylesheet" href="signup.css" />
</head>

<body>
  <div class="container">
    <div class="login-section">

      <h2>Sign Up</h2>
      <p>sign up to create you new account</p>
      <form id="signupform">
        <div class="name-fields">
          <input type="text" placeholder="First name" name="firstname" required>
          <input type="text" placeholder="Last name" name="lastname" required>
        </div>
        <input type="email" id="email" placeholder="email address" name="email" required />


        <input type="text" id="phone" placeholder="phone number" name="phonenum" required />

        <!-- Password field -->
        <input type="password" id="myInput" name="password" placeholder="password">

        <!-- An element to toggle between password visibility -->
        <div class="check">
          <span>
            <input type="checkbox" class="passwd" onclick="myFunction()"><label for="passwd">
              Show Password</label></span>
          <div class="options">
            <a href="#" class="forgot">Forgot Password</a>
          </div>
          
        </div>
        <select name="role" class="role1" required>
          <option value="Student">Student</option>
          <option value="Teacher">Teacher</option>
        </select>
        <div class="checkboxes">
          <label>
            <input type="checkbox" required> <span>By creating an account, I agree to our
              <a href="#">Terms of use</a> and <a href="#">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="login-btn">Sign Up</button>

        <p class="signup">Already have an account? <a href="login.html">Login</a></p>

        <p class="signup">Need help ? <a href="signup.html">contact Us</a></p>

      </form>
    </div>

    <div class="illustration">
      <img src="Screenshot (6).png" alt="Illustration" />
    </div>
  </div>
  <script src="signup.js"></script>
</body>

</html>
