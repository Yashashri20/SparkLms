<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Courses</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f1f4f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 2.5em;
    }

    .course-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 3fr));
      gap: 25px;
      padding: 0 10px;
    }

    .course-card {
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .course-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    video {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px 20px;
    }

    .course-title {
      font-size: 1.5em;
      color: #007bff;
      margin: 10px 0 5px;
    }

    .course-info {
      font-size: 0.95em;
      margin: 5px 0;
      color: #333;
    }

    .course-info strong {
      color: #2c3e50;
    }

    .course-description {
      margin-top: 10px;
      font-size: 0.95em;
      color: #555;
      line-height: 1.5;
      background: #f8f9fa;
      padding: 10px;
      border-left: 4px solid #007bff;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>🎓 Explore Courses</h1>
  <div class="course-list" id="courseList"></div>

  <script>
    async function loadCourses() {
      try {
        const res = await fetch("http://localhost:5000/api/courses");
        const courses = await res.json();

        const courseList = document.getElementById("courseList");
        courseList.innerHTML = "";

        if (courses.length === 0) {
          courseList.innerHTML = "<p>No courses available</p>";
          return;
        }

        courses.forEach((course) => {
          const card = document.createElement("div");
          card.classList.add("course-card");

          card.innerHTML = `
            <video controls>
              <source src="http://localhost:5000${course.video_path}" type="video/mp4" />
              Your browser does not support the video tag.
            </video>
            <div class="card-content">
              <div class="course-title">${course.title}</div>
              <div class="course-info"><strong>Teacher:</strong> ${course.teacher_name}</div>
              <div class="course-info"><strong>Standard:</strong> ${course.standard}</div>
              <div class="course-description">${course.description}</div>
            </div>
          `;
          courseList.appendChild(card);
        });
      } catch (err) {
        console.error("Error loading courses:", err);
        document.getElementById("courseList").innerHTML = "<p>Error loading courses</p>";
      }
    }

    loadCourses();
  </script>
</body>
</html>
