<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Take Quiz</title>
  <style>


    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(120deg, #4f46e5, #9333ea);
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      padding: 30px;
      animation: fadeIn 0.6s ease;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #4f46e5;
    }

    .question {
      margin-bottom: 25px;
      padding: 15px;
      border-left: 4px solid #9333ea;
      background-color: #f9f9f9;
      border-radius: 8px;
    }

    .question h3 {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      cursor: pointer;
      padding: 8px;
      border-radius: 5px;
      transition: background 0.3s;
    }

    input[type="radio"] {
      margin-right: 8px;
    }

    label:hover {
      background: #ede9fe;
    }

    button {
      display: block;
      margin: 30px auto 0;
      padding: 12px 24px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #4338ca;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .container {
        margin: 20px;
        padding: 20px;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="quizTitle">Loading quiz...</h2>
    <form id="quizForm"></form>
    <button type="submit" form="quizForm">Submit Quiz</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const quizId = params.get('quizId');

    async function loadQuiz() {
      const form = document.getElementById('quizForm');
      if (!form) return;

      try {
        const res = await fetch(`http://localhost:5000/api/quiz/${quizId}`);
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const quiz = await res.json();

        document.getElementById('quizTitle').innerText = quiz.title || 'Quiz';
        form.innerHTML = '';

        if (!quiz.questions || quiz.questions.length === 0) {
          form.innerHTML = '<p>No questions available.</p>';
          return;
        }

        quiz.questions.forEach((q, index) => {
          form.innerHTML += `
            <div class="question">
              <h3>Q${index + 1}: ${q.question}</h3>
              ${q.options.map(opt => `
                <label>
                  <input type="radio" name="q${index}" value="${opt}"> ${opt}
                </label>
              `).join('')}
            </div>
          `;
        });
      } catch (err) {
        console.error('Error loading quiz:', err);
        form.innerHTML = '<p>Error loading quiz</p>';
      }
    }

    document.getElementById('quizForm').addEventListener('submit', async e => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const answers = [];

      for (let i = 0; i < 5; i++) answers.push(formData.get(`q${i}`));

      try {
        const res = await fetch(`http://localhost:5000/api/quiz/submit/${quizId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ answers, student_id: 1 })
        });

        const data = await res.json();
        alert("✅ Your score: " + data.score + "/5");
      } catch (error) {
        alert("❌ Error submitting quiz");
        console.error(error);
      }
    });

    loadQuiz();
  </script>
</body>
</html>
